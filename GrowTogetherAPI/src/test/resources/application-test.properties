# Configuración de tests: H2 in-memory + JWT secret dummy.
# Se activa con @ActiveProfiles("test") en los @SpringBootTest.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.sql.init.mode=never

# JWT_SECRET dummy en Base64. Decodifica a 64 bytes (suficiente para HS256).
JWT_SECRET=M2NmYTc2ZWYxNDkzN2MxYzBlYTUxOWY4ZmMwNTdhODBmY2QwNGE3NDIwZjhlOGJjZDBhNzU2N2MyNzJlMDA3Yg==
jwt.expiration=3600000

app.cors.allowed-origins=http://localhost
