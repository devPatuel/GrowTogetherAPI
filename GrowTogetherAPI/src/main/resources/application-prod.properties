# Configuracion de produccion. Se activa con SPRING_PROFILES_ACTIVE=prod.
# Las credenciales y secretos llegan via variables de entorno (.env / SSM Parameter Store).

# JPA: en produccion no se modifica el esquema automaticamente, solo se valida
# que las entidades casen con las tablas. Cualquier cambio de esquema debe
# hacerse con migraciones controladas.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.sql.init.mode=never

# Swagger desactivado en produccion (no exponer la API publica)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Solo el endpoint de health publicado para los healthchecks de Docker
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging mas conservador en produccion
logging.level.root=WARN
logging.level.com.jordipatuel=INFO
