spring.application.name=GrowTogetherAPI
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/GrowTogether_DB}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# mode=never para no re-ejecutar data.sql en cada arranque (tablas ya inicializadas).
# Para instalacion limpia desde cero: cambiar a mode=always UNA VEZ y volver a never.
spring.sql.init.continue-on-error=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Limites para subida de imagen (base64 en JSON body)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
