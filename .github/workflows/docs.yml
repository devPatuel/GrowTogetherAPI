name: Generar y publicar Javadoc

on:
  push:
    branches: [main]
    paths:
      - 'GrowTogetherAPI/src/**'
      - 'GrowTogetherAPI/build.gradle.kts'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Generar Javadoc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Permisos gradlew
        working-directory: GrowTogetherAPI
        run: chmod +x gradlew

      - name: Generar Javadoc
        working-directory: GrowTogetherAPI
        run: ./gradlew javadoc -Dorg.gradle.jvmargs="-Xmx2g" --no-daemon
        env:
          # Silencia validaciones estrictas de Javadoc (@param, @return, etc.)
          # para que los comentarios existentes no rompan el build
          JAVA_TOOL_OPTIONS: "-Duser.language=es"

      - name: Subir Javadoc como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-html
          path: GrowTogetherAPI/build/docs/javadoc/
          retention-days: 30

      - name: Preparar artifact para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: GrowTogetherAPI/build/docs/javadoc/

  deploy-pages:
    name: Desplegar a GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    # continue-on-error evita que el workflow falle si Pages aun no esta habilitado
    # (repo privado sin GitHub Pro). El artifact del job anterior sigue disponible.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
